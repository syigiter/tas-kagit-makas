<!DOCTYPE html>
<html>
<head>
    <title>Taş-Kağıt-Makas</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <h1>🎮 Taş-Kağıt-Makas</h1>
    <button id="createBtn">Oda Oluştur</button>
    <button id="joinBtn">Oyuna Katıl</button>
    <input id="roomCode" placeholder="4 haneli kod" maxlength="4" />
    <div id="status"></div>

    <script>
        const socket = io({
            transports: ['polling', 'websocket']
        });

        socket.on('connect', () => {
            document.getElementById('status').innerHTML = '✅ Sunucuya bağlandı!';
        });

        socket.on('connect_error', (err) => {
            document.getElementById('status').innerHTML = '❌ Bağlantı hatası: ' + err.message;
        });

        socket.on('roomCreated', (data) => {
            document.getElementById('status').innerHTML = '🏠 Oda oluşturuldu: ' + data.roomCode;
        });

        document.getElementById('createBtn').onclick = () => {
            socket.emit('createRoom', { playerName: 'EvSahibi', targetScore: 3 });
        };

        document.getElementById('joinBtn').onclick = () => {
            const code = document.getElementById('roomCode').value;
            if (code.length === 4) {
                socket.emit('joinRoom', { roomCode: code, playerName: 'Arkadas' });
            } else {
                alert('4 haneli kod girin!');
            }
        };
    </script>
</body>
</html>
